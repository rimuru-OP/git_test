<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book</title>
    <script src = "javscript.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="start">Start</button>
    <div class="book"></div>
    <form class="info hidden">
        <label for="author">Author:</label>
        <input type="text" id="author" placeholder="Enter author" required>
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Enter title" required>
        <label for="pages">Pages:</label>
        <input type="number" id="pages" placeholder="Enter pages" required>
        <label for="read">Read:</label>
        <input type="checkbox" id="read">
        <button class="sub1" type="submit">Submit</button>
    </form>
</body>
</html>
